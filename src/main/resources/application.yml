spring:
  application:
    name: GreenEcoMall
  datasource:
    url: jdbc:postgresql://localhost:5432/greenecomall
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: greenecomall-super-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 900000       # 15 minutes
  refresh-token-expiration: 2592000000  # 30 days

app:
  otp:
    expiration-minutes: 5
    max-requests-per-hour: 5
  payment:
    qr-expiration-minutes: 30
  finik:
    webhook-secret: finik-hmac-secret-key
    base-url: https://api.finik.kg

server:
  port: 8080
